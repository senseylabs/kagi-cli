version: 2

project_name: kagi-cli

builds:
  - id: kagi
    main: .
    binary: kagi
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]

# Linux native packages (.deb / .rpm / .apk), amd64 + arm64.
# nfpm only produces packages for linux artifacts from the referenced build,
# so darwin/windows archives are unaffected.
nfpms:
  - id: kagi
    package_name: kagi
    ids:
      - kagi
    vendor: Sensey Labs
    maintainer: "Sensey Labs <devs@sensey.io>"
    description: "Kagi CLI — secrets management for Sensey"
    homepage: "https://github.com/senseylabs/kagi-cli"
    license: MIT
    bindir: /usr/bin
    formats:
      - deb
      - rpm
      - apk

brews:
  - name: kagi
    repository:
      owner: senseylabs
      name: homebrew-tap
      token: "{{ .Env.GITHUB_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/senseylabs/kagi-cli"
    description: "Kagi CLI — secrets management for Sensey"
    license: "MIT"
    install: |
      bin.install "kagi"
    test: |
      system "#{bin}/kagi", "--version"

